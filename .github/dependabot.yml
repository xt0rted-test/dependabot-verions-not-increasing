version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 99
    versioning-strategy: increase
    groups:
      vitest:
        patterns:
          - "@vitest/*"
          - "vitest"
      tailwind:
        patterns:
          - "@tailwindcss/*"
          - "tailwindcss"
